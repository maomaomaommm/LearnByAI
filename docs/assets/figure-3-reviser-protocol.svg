<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Reviser local editing protocol</title>
  <desc id="desc">A research style diagram of the two-phase Reviser protocol: propose first, apply only after exact matching and user confirmation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .phase { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.1; rx: 18; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 1.25; rx: 12; }
      .guard { fill: #fff7ed; stroke: #9a3412; stroke-width: 1.2; rx: 12; }
      .success { fill: #f0fdf4; stroke: #166534; stroke-width: 1.2; rx: 12; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #526070; }
      .phase-title { font: 700 13px Arial, sans-serif; fill: #334155; letter-spacing: .04em; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .mono { font: 700 12px Consolas, monospace; fill: #334155; }
      .arrow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .reject { stroke: #9a3412; stroke-width: 1.3; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="560"/>
  <text class="title" x="56" y="50">Figure 3. Two-phase Reviser protocol</text>
  <text class="subtitle" x="56" y="74">The model proposes text; deterministic backend logic decides whether it can be safely applied.</text>

  <rect class="phase" x="50" y="110" width="490" height="330"/>
  <text class="phase-title" x="80" y="145">PHASE I: PROPOSAL</text>

  <rect class="box" x="82" y="175" width="150" height="82"/>
  <text class="label" x="118" y="207">Selection</text>
  <text class="small" x="108" y="229">span / paragraph</text>
  <text class="small" x="108" y="247">/ section</text>

  <rect class="box" x="290" y="175" width="178" height="82"/>
  <text class="label" x="337" y="207">Prompt</text>
  <text class="small" x="321" y="229">course context</text>
  <text class="small" x="321" y="247">user intent</text>

  <rect class="box" x="186" y="310" width="210" height="82"/>
  <text class="mono" x="236" y="340">REVISER JSON</text>
  <text class="small" x="222" y="362">beforeText / afterText</text>
  <text class="small" x="222" y="380">diagnosis / confidence</text>

  <path class="arrow" d="M232 216 H290"/>
  <path class="arrow" d="M379 257 V310"/>
  <path class="arrow" d="M232 257 C232 286 244 296 291 310"/>

  <rect class="phase" x="580" y="110" width="490" height="330"/>
  <text class="phase-title" x="610" y="145">PHASE II: APPLICATION</text>

  <rect class="box" x="612" y="175" width="150" height="82"/>
  <text class="label" x="649" y="207">Preview</text>
  <text class="small" x="639" y="229">BEFORE</text>
  <text class="small" x="639" y="247">AFTER</text>

  <rect class="guard" x="820" y="175" width="178" height="82"/>
  <text class="label" x="850" y="207">Exact Match</text>
  <text class="small" x="848" y="229">count(beforeText)</text>
  <text class="small" x="848" y="247">must equal 1</text>

  <rect class="success" x="716" y="310" width="210" height="82"/>
  <text class="label" x="776" y="340">Commit</text>
  <text class="small" x="752" y="362">replace once + recheck</text>
  <text class="small" x="752" y="380">undo / reapply history</text>

  <path class="arrow" d="M396 351 C472 351 520 216 612 216"/>
  <path class="arrow" d="M762 216 H820"/>
  <path class="arrow" d="M909 257 V310"/>
  <path class="reject" d="M998 216 C1040 216 1040 450 840 450"/>
  <text class="small" x="874" y="472">reject if missing or duplicated</text>
</svg>
