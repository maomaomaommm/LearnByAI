<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">LearnByAI system architecture</title>
  <desc id="desc">A research style architecture diagram showing user input, course planning, multi-agent generation, reader interaction, storage, and worker infrastructure.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f3a4a"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f7f9fc; stroke: #bcc7d8; stroke-width: 1.2; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.3; rx: 10; }
      .box-soft { fill: #f8fbff; stroke: #64748b; stroke-width: 1.1; rx: 10; }
      .store { fill: #fffdf7; stroke: #8a6d3b; stroke-width: 1.2; rx: 10; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #526070; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #2f3a4a; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.2; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="56" y="50">Figure 1. LearnByAI end-to-end architecture</text>
  <text class="subtitle" x="56" y="74">A course is planned, generated, checked, read, queried, and locally revised under persistent user isolation.</text>

  <rect class="panel" x="48" y="105" width="1024" height="360" rx="18"/>

  <rect class="box" x="78" y="145" width="150" height="96"/>
  <text class="label" x="104" y="178">User Profile</text>
  <text class="small" x="101" y="202">topic / goal</text>
  <text class="small" x="101" y="220">background / style</text>

  <rect class="box-soft" x="270" y="132" width="168" height="122"/>
  <text class="label" x="304" y="164">Research</text>
  <text class="small" x="295" y="189">Exa / StepFun / Kimi</text>
  <text class="small" x="295" y="208">recent papers</text>
  <text class="small" x="295" y="227">evidence brief</text>

  <rect class="box" x="480" y="132" width="168" height="122"/>
  <text class="label" x="517" y="164">Planner</text>
  <text class="small" x="510" y="189">ARCHITECT</text>
  <text class="small" x="510" y="208">Course Bible</text>
  <text class="small" x="510" y="227">chapter contracts</text>

  <rect class="box" x="690" y="132" width="168" height="122"/>
  <text class="label" x="729" y="164">Generator</text>
  <text class="small" x="718" y="189">AUTHOR</text>
  <text class="small" x="718" y="208">POLISHER</text>
  <text class="small" x="718" y="227">REVIEWER + TQH</text>

  <rect class="box" x="900" y="132" width="140" height="122"/>
  <text class="label" x="941" y="164">Reader</text>
  <text class="small" x="930" y="189">Markdown</text>
  <text class="small" x="930" y="208">LaTeX</text>
  <text class="small" x="930" y="227">PDF / TeX</text>

  <rect class="box-soft" x="690" y="302" width="168" height="96"/>
  <text class="label" x="733" y="334">Tutor</text>
  <text class="small" x="718" y="358">anchored Q&amp;A</text>
  <text class="small" x="718" y="376">dialog history</text>

  <rect class="box-soft" x="900" y="302" width="140" height="96"/>
  <text class="label" x="926" y="334">Reviser</text>
  <text class="small" x="922" y="358">local edits</text>
  <text class="small" x="922" y="376">undo / reapply</text>

  <rect class="store" x="190" y="500" width="180" height="72"/>
  <text class="label" x="232" y="531">Supabase</text>
  <text class="small" x="220" y="552">Auth / Postgres / RLS</text>

  <rect class="store" x="470" y="500" width="180" height="72"/>
  <text class="label" x="511" y="531">Job Queue</text>
  <text class="small" x="499" y="552">generation_jobs</text>

  <rect class="store" x="750" y="500" width="180" height="72"/>
  <text class="label" x="790" y="531">Storage</text>
  <text class="small" x="786" y="552">PDF / TeX exports</text>

  <path class="arrow" d="M228 193 H270"/>
  <path class="arrow" d="M438 193 H480"/>
  <path class="arrow" d="M648 193 H690"/>
  <path class="arrow" d="M858 193 H900"/>
  <path class="arrow" d="M970 254 V302"/>
  <path class="arrow" d="M900 350 H858"/>
  <path class="dash" d="M564 254 V500"/>
  <path class="dash" d="M774 254 V302"/>
  <path class="dash" d="M970 398 C970 456 898 485 840 500"/>
  <path class="dash" d="M154 241 C154 420 236 470 280 500"/>

  <rect class="legend" x="56" y="500" width="96" height="72"/>
  <text class="tiny" x="73" y="525">Legend</text>
  <path d="M72 544 H108" class="arrow"/>
  <text class="tiny" x="116" y="548">flow</text>
  <path d="M72 562 H108" class="dash"/>
  <text class="tiny" x="116" y="566">state</text>
</svg>
