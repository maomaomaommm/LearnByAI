<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Multi-agent generation pipeline</title>
  <desc id="desc">A research style diagram describing the ARCHITECT, AUTHOR, POLISHER, REVIEWER and TQH pipeline.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .stage { fill: #ffffff; stroke: #111827; stroke-width: 1.3; rx: 12; }
      .artifact { fill: #f8fafc; stroke: #64748b; stroke-width: 1.1; rx: 10; }
      .quality { fill: #fff8ed; stroke: #a16207; stroke-width: 1.2; rx: 12; }
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #526070; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .mono { font: 700 12px Consolas, monospace; fill: #334155; }
      .arrow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .return { stroke: #7c2d12; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .lane { fill: #f8fafc; stroke: #d0d7e2; stroke-width: 1; rx: 16; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="520"/>
  <text class="title" x="56" y="50">Figure 2. Multi-agent textbook generation pipeline</text>
  <text class="subtitle" x="56" y="74">Each agent owns a narrow contract; quality gates decide whether a chapter becomes readable.</text>

  <rect class="lane" x="48" y="110" width="1024" height="250"/>

  <rect class="stage" x="72" y="158" width="138" height="92"/>
  <text class="mono" x="102" y="188">ARCHITECT</text>
  <text class="small" x="98" y="213">course plan</text>
  <text class="small" x="98" y="231">chapter contract</text>

  <rect class="artifact" x="250" y="158" width="138" height="92"/>
  <text class="label" x="285" y="188">Course</text>
  <text class="small" x="279" y="213">Bible</text>
  <text class="small" x="279" y="231">requiredTopics</text>

  <rect class="stage" x="428" y="158" width="138" height="92"/>
  <text class="mono" x="463" y="188">AUTHOR</text>
  <text class="small" x="458" y="213">draft chapter</text>
  <text class="small" x="458" y="231">examples / proof</text>

  <rect class="stage" x="606" y="158" width="138" height="92"/>
  <text class="mono" x="637" y="188">POLISHER</text>
  <text class="small" x="636" y="213">format repair</text>
  <text class="small" x="636" y="231">LaTeX / code</text>

  <rect class="quality" x="784" y="158" width="138" height="92"/>
  <text class="mono" x="824" y="188">TQH</text>
  <text class="small" x="814" y="213">structure</text>
  <text class="small" x="814" y="231">math / continuity</text>

  <rect class="stage" x="962" y="158" width="86" height="92"/>
  <text class="mono" x="974" y="188">REVIEWER</text>
  <text class="small" x="980" y="213">final</text>
  <text class="small" x="980" y="231">verdict</text>

  <path class="arrow" d="M210 204 H250"/>
  <path class="arrow" d="M388 204 H428"/>
  <path class="arrow" d="M566 204 H606"/>
  <path class="arrow" d="M744 204 H784"/>
  <path class="arrow" d="M922 204 H962"/>

  <rect class="artifact" x="388" y="395" width="154" height="72"/>
  <text class="label" x="421" y="425">Readable</text>
  <text class="small" x="417" y="446">chapter = ready</text>

  <rect class="artifact" x="596" y="395" width="154" height="72"/>
  <text class="label" x="636" y="425">Draft</text>
  <text class="small" x="625" y="446">quality_failed</text>

  <rect class="artifact" x="804" y="395" width="154" height="72"/>
  <text class="label" x="836" y="425">Repair</text>
  <text class="small" x="827" y="446">targeted retry</text>

  <path class="arrow" d="M1005 250 C1005 330 520 330 465 395"/>
  <path class="arrow" d="M853 250 C853 330 704 342 673 395"/>
  <path class="return" d="M881 395 C920 322 744 300 675 250"/>
</svg>
